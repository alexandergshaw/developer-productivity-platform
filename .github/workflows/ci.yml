name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    # Runs on Linux and Windows to catch any cross-platform nondeterminism.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run test suite (includes the determinism gate)
        run: python -m unittest discover -s tests -v
      - name: Advise gate (reviewer-of-record — new findings fail the build)
        run: python -m detcode advise --dir detcode --check
